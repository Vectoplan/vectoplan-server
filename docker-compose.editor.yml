# ./docker-compose.editor.yml

# ------------------------------------------------------------------------------
# VECTOPLAN Editor Stack
# ------------------------------------------------------------------------------
# Start aus dem Repo-Root:
#   docker compose -f docker-compose.editor.yml up -d --build
#
# Zweck:
#   Enger Entwicklungsstack für den Minecraft-/Hytale-artigen 3D-Editor.
#
# Enthalten:
# - vectoplan-editor
# - vectoplan-library-db
# - vectoplan-library
# - vectoplan-chunk-db
# - vectoplan-chunk
#
# Nicht enthalten:
# - vectoplan-openLayer
# - GeoServer
# - PostGIS für Geodaten
# - vectoplan-core
# - vectoplan-converter
# - vectoplan-language
# - vectoplan-app
#
# Wichtig für vectoplan-library:
#
#   Creative-Library-Quelle:
#     services/vectoplan-library/src/library/source
#
#   Containerpfad:
#     /opt/vectoplan/services/vectoplan-library/src/library/source
#
#   PostgreSQL:
#     vectoplan-library-db:5432/vectoplan_library
#
#   DB-Bootstrap:
#     entrypoint.sh wartet auf PostgreSQL und führt optional aus:
#       flask db init
#       flask db migrate
#       flask db upgrade
#
#   Testroute:
#     GET http://localhost:5001/api/v1/vplib/library/blocks
#
#   Detailroute:
#     GET http://localhost:5001/api/v1/vplib/library/blocks/vp.hochbau.bloecke.basic_stone_block
#
#   Variantenroute:
#     GET http://localhost:5001/api/v1/vplib/library/blocks/vp.hochbau.bloecke.basic_stone_block/variants
#
#   Tree:
#     GET http://localhost:5001/api/v1/vplib/library/tree
#
#   Create:
#     GET  http://localhost:5001/create
#     GET  http://localhost:5001/api/v1/vplib/create/options
#     POST http://localhost:5001/api/v1/vplib/create/validate
#     POST http://localhost:5001/api/v1/vplib/create/package-plan
#     POST http://localhost:5001/api/v1/vplib/create/download
#     POST http://localhost:5001/api/v1/vplib/create/save
# ------------------------------------------------------------------------------

name: vectoplan-editor-stack


# ------------------------------------------------------------------------------
# Gemeinsame Python-Defaults
# ------------------------------------------------------------------------------

x-vectoplan-python-environment: &vectoplan-python-environment
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"


# ------------------------------------------------------------------------------
# Gemeinsame PostgreSQL-Defaults für den Library-Service
# ------------------------------------------------------------------------------

x-vectoplan-library-postgres-environment: &vectoplan-library-postgres-environment
  POSTGRES_DB: "${VECTOPLAN_LIBRARY_POSTGRES_DB:-vectoplan_library}"
  POSTGRES_USER: "${VECTOPLAN_LIBRARY_POSTGRES_USER:-vectoplan}"
  POSTGRES_PASSWORD: "${VECTOPLAN_LIBRARY_POSTGRES_PASSWORD:-vectoplan}"
  PGDATA: "/var/lib/postgresql/data/pgdata"


# ------------------------------------------------------------------------------
# Gemeinsame PostgreSQL-Defaults für den Chunk-Service
# ------------------------------------------------------------------------------

x-vectoplan-chunk-postgres-environment: &vectoplan-chunk-postgres-environment
  POSTGRES_DB: "${VECTOPLAN_CHUNK_POSTGRES_DB:-vectoplan_chunk}"
  POSTGRES_USER: "${VECTOPLAN_CHUNK_POSTGRES_USER:-vectoplan_chunk}"
  POSTGRES_PASSWORD: "${VECTOPLAN_CHUNK_POSTGRES_PASSWORD:-vectoplan_chunk}"
  PGDATA: "/var/lib/postgresql/data/pgdata"


# ------------------------------------------------------------------------------
# Gemeinsame Environment-Defaults für den Editor-Service
# ------------------------------------------------------------------------------

x-vectoplan-editor-environment: &vectoplan-editor-environment
  <<: *vectoplan-python-environment

  SERVICE_NAME: "vectoplan-editor"
  APP_NAME: "vectoplan-editor"
  APP_HOME: "/opt/vectoplan/services/vectoplan-editor"
  VECTOPLAN_SERVICE_NAME: "vectoplan-editor"

  VECTOPLAN_EDITOR_CONFIG: "${VECTOPLAN_EDITOR_CONFIG:-development}"
  VECTOPLAN_EDITOR_DEBUG: "${VECTOPLAN_EDITOR_DEBUG:-true}"
  VECTOPLAN_EDITOR_HOST: "0.0.0.0"
  VECTOPLAN_EDITOR_PORT: "5000"

  VECTOPLAN_EDITOR_STARTUP_MODULE: "${VECTOPLAN_EDITOR_STARTUP_MODULE:-src.bootstrap.startup}"
  VECTOPLAN_EDITOR_PRESTART_CHECK: "${VECTOPLAN_EDITOR_PRESTART_CHECK:-true}"
  VECTOPLAN_EDITOR_PRINT_STARTUP_SUMMARY: "${VECTOPLAN_EDITOR_PRINT_STARTUP_SUMMARY:-true}"
  VECTOPLAN_EDITOR_STARTUP_STRICT: "${VECTOPLAN_EDITOR_STARTUP_STRICT:-false}"
  VECTOPLAN_EDITOR_STRICT_ASSET_CHECKS: "${VECTOPLAN_EDITOR_STRICT_ASSET_CHECKS:-false}"

  VECTOPLAN_EDITOR_FRONTEND_BUILD_REQUIRED: "${VECTOPLAN_EDITOR_FRONTEND_BUILD_REQUIRED:-true}"
  VECTOPLAN_EDITOR_FRONTEND_STRICT_CHECKS: "${VECTOPLAN_EDITOR_FRONTEND_STRICT_CHECKS:-true}"
  VECTOPLAN_EDITOR_FRONTEND_EXPECTED_ENTRY: "${VECTOPLAN_EDITOR_FRONTEND_EXPECTED_ENTRY:-./static/editor/js/main.js}"

  VECTOPLAN_EDITOR_WORLD_MODE: "${VECTOPLAN_EDITOR_WORLD_MODE:-chunk_service}"
  VECTOPLAN_EDITOR_WORLD_SOURCE_KIND: "${VECTOPLAN_EDITOR_WORLD_SOURCE_KIND:-chunk-service}"

  VECTOPLAN_EDITOR_CHUNK_ENABLED: "${VECTOPLAN_EDITOR_CHUNK_ENABLED:-true}"
  VECTOPLAN_EDITOR_CHUNK_MODE: "${VECTOPLAN_EDITOR_CHUNK_MODE:-remote}"
  VECTOPLAN_EDITOR_CHUNK_SOURCE_KIND: "${VECTOPLAN_EDITOR_CHUNK_SOURCE_KIND:-chunk-service}"

  VECTOPLAN_EDITOR_CHUNK_SERVICE_INTERNAL_URL: "${VECTOPLAN_EDITOR_CHUNK_SERVICE_INTERNAL_URL:-http://vectoplan-chunk:5000}"
  VECTOPLAN_EDITOR_CHUNK_API_PREFIX: "${VECTOPLAN_EDITOR_CHUNK_API_PREFIX:-/editor/api/chunk}"
  VECTOPLAN_EDITOR_CHUNK_BROWSER_BASE_URL: "${VECTOPLAN_EDITOR_CHUNK_BROWSER_BASE_URL:-/editor/api/chunk}"

  VECTOPLAN_EDITOR_DEFAULT_PROJECT_ID: "${VECTOPLAN_EDITOR_DEFAULT_PROJECT_ID:-dev-project}"
  VECTOPLAN_EDITOR_DEFAULT_WORLD_ID: "${VECTOPLAN_EDITOR_DEFAULT_WORLD_ID:-world_spawn}"
  VECTOPLAN_EDITOR_CHUNK_DEFAULT_PROJECT_ID: "${VECTOPLAN_EDITOR_CHUNK_DEFAULT_PROJECT_ID:-dev-project}"
  VECTOPLAN_EDITOR_CHUNK_DEFAULT_WORLD_ID: "${VECTOPLAN_EDITOR_CHUNK_DEFAULT_WORLD_ID:-world_spawn}"

  VECTOPLAN_EDITOR_CHUNK_REQUEST_TIMEOUT: "${VECTOPLAN_EDITOR_CHUNK_REQUEST_TIMEOUT:-10}"
  VECTOPLAN_EDITOR_CHUNK_COMMAND_TIMEOUT: "${VECTOPLAN_EDITOR_CHUNK_COMMAND_TIMEOUT:-15}"
  VECTOPLAN_EDITOR_CHUNK_BATCH_TIMEOUT: "${VECTOPLAN_EDITOR_CHUNK_BATCH_TIMEOUT:-20}"
  VECTOPLAN_EDITOR_CHUNK_STATUS_TIMEOUT: "${VECTOPLAN_EDITOR_CHUNK_STATUS_TIMEOUT:-5}"
  VECTOPLAN_EDITOR_CHUNK_MAX_RESPONSE_BYTES: "${VECTOPLAN_EDITOR_CHUNK_MAX_RESPONSE_BYTES:-20971520}"
  VECTOPLAN_EDITOR_CHUNK_STATUS_PATHS: "${VECTOPLAN_EDITOR_CHUNK_STATUS_PATHS:-/projects/_status,/chunks/_status,/commands/_status,/}"

  VECTOPLAN_EDITOR_CHUNK_PROXY_DIAGNOSTICS_ENABLED: "${VECTOPLAN_EDITOR_CHUNK_PROXY_DIAGNOSTICS_ENABLED:-true}"
  VECTOPLAN_EDITOR_CHUNK_PROXY_ALLOW_PROJECT_MUTATIONS: "${VECTOPLAN_EDITOR_CHUNK_PROXY_ALLOW_PROJECT_MUTATIONS:-true}"
  VECTOPLAN_EDITOR_CHUNK_PROXY_ALLOW_WORLD_MUTATIONS: "${VECTOPLAN_EDITOR_CHUNK_PROXY_ALLOW_WORLD_MUTATIONS:-true}"

  VECTOPLAN_EDITOR_INVENTORY_SOURCE: "${VECTOPLAN_EDITOR_INVENTORY_SOURCE:-chunk-service}"
  VECTOPLAN_EDITOR_INVENTORY_ICON_MODE: "${VECTOPLAN_EDITOR_INVENTORY_ICON_MODE:-icon-only}"
  VECTOPLAN_EDITOR_INVENTORY_HOTBAR_SIZE: "${VECTOPLAN_EDITOR_INVENTORY_HOTBAR_SIZE:-9}"
  VECTOPLAN_EDITOR_INVENTORY_DEFAULT_SELECTED_SLOT: "${VECTOPLAN_EDITOR_INVENTORY_DEFAULT_SELECTED_SLOT:-0}"
  VECTOPLAN_EDITOR_INVENTORY_SCROLL_WRAP: "${VECTOPLAN_EDITOR_INVENTORY_SCROLL_WRAP:-true}"
  VECTOPLAN_EDITOR_INVENTORY_ALLOW_PLACE_ACTION: "${VECTOPLAN_EDITOR_INVENTORY_ALLOW_PLACE_ACTION:-true}"
  VECTOPLAN_EDITOR_INVENTORY_ALLOW_BREAK_ACTION: "${VECTOPLAN_EDITOR_INVENTORY_ALLOW_BREAK_ACTION:-true}"

  VECTOPLAN_EDITOR_CHUNKS_ENABLED: "${VECTOPLAN_EDITOR_CHUNKS_ENABLED:-true}"
  VECTOPLAN_EDITOR_CHUNKS_EMPTY_WORLD: "${VECTOPLAN_EDITOR_CHUNKS_EMPTY_WORLD:-false}"
  VECTOPLAN_EDITOR_CHUNKS_CHUNK_SIZE: "${VECTOPLAN_EDITOR_CHUNKS_CHUNK_SIZE:-16}"
  VECTOPLAN_EDITOR_CHUNKS_VIEW_DISTANCE: "${VECTOPLAN_EDITOR_CHUNKS_VIEW_DISTANCE:-4}"
  VECTOPLAN_EDITOR_CHUNKS_PRELOAD_RADIUS: "${VECTOPLAN_EDITOR_CHUNKS_PRELOAD_RADIUS:-1}"
  VECTOPLAN_EDITOR_CHUNKS_UNLOAD_DISTANCE: "${VECTOPLAN_EDITOR_CHUNKS_UNLOAD_DISTANCE:-6}"
  VECTOPLAN_EDITOR_CHUNKS_MAX_LOADED_CHUNKS: "${VECTOPLAN_EDITOR_CHUNKS_MAX_LOADED_CHUNKS:-196}"
  VECTOPLAN_EDITOR_CHUNKS_LOAD_AROUND_PLAYER: "${VECTOPLAN_EDITOR_CHUNKS_LOAD_AROUND_PLAYER:-true}"
  VECTOPLAN_EDITOR_CHUNKS_DEBUG_DRAW_CHUNK_BOUNDS: "${VECTOPLAN_EDITOR_CHUNKS_DEBUG_DRAW_CHUNK_BOUNDS:-true}"
  VECTOPLAN_EDITOR_CHUNKS_PREFER_BATCH_LOAD: "${VECTOPLAN_EDITOR_CHUNKS_PREFER_BATCH_LOAD:-true}"
  VECTOPLAN_EDITOR_CHUNKS_RELOAD_DIRTY_AFTER_COMMAND: "${VECTOPLAN_EDITOR_CHUNKS_RELOAD_DIRTY_AFTER_COMMAND:-true}"

  VECTOPLAN_EDITOR_RUN_MODE: "${VECTOPLAN_EDITOR_RUN_MODE:-gunicorn}"

  GUNICORN_WORKERS: "${VECTOPLAN_EDITOR_GUNICORN_WORKERS:-2}"
  GUNICORN_THREADS: "${VECTOPLAN_EDITOR_GUNICORN_THREADS:-2}"
  GUNICORN_TIMEOUT: "${VECTOPLAN_EDITOR_GUNICORN_TIMEOUT:-120}"
  GUNICORN_KEEPALIVE: "${VECTOPLAN_EDITOR_GUNICORN_KEEPALIVE:-5}"
  GUNICORN_LOG_LEVEL: "${VECTOPLAN_EDITOR_GUNICORN_LOG_LEVEL:-info}"
  GUNICORN_ACCESSLOG: "${VECTOPLAN_EDITOR_GUNICORN_ACCESSLOG:--}"
  GUNICORN_ERRORLOG: "${VECTOPLAN_EDITOR_GUNICORN_ERRORLOG:--}"


# ------------------------------------------------------------------------------
# Gemeinsame Environment-Defaults für den Library-Service
# ------------------------------------------------------------------------------

x-vectoplan-library-environment: &vectoplan-library-environment
  <<: *vectoplan-python-environment

  SERVICE_NAME: "vectoplan-library"
  APP_NAME: "vectoplan-library"
  APP_HOME: "/opt/vectoplan/services/vectoplan-library"
  VECTOPLAN_SERVICE_NAME: "vectoplan-library"

  VECTOPLAN_LIBRARY_CONFIG: "${VECTOPLAN_LIBRARY_CONFIG:-development}"
  VECTOPLAN_LIBRARY_DEBUG: "${VECTOPLAN_LIBRARY_DEBUG:-true}"
  VECTOPLAN_LIBRARY_HOST: "0.0.0.0"
  VECTOPLAN_LIBRARY_PORT: "5000"

  VECTOPLAN_LIBRARY_STARTUP_MODULE: "${VECTOPLAN_LIBRARY_STARTUP_MODULE:-src.bootstrap.startup}"
  VECTOPLAN_LIBRARY_PRESTART_CHECK: "${VECTOPLAN_LIBRARY_PRESTART_CHECK:-true}"
  VECTOPLAN_LIBRARY_PRESTART_CREATE_APP: "${VECTOPLAN_LIBRARY_PRESTART_CREATE_APP:-false}"
  VECTOPLAN_LIBRARY_PRINT_STARTUP_SUMMARY: "${VECTOPLAN_LIBRARY_PRINT_STARTUP_SUMMARY:-true}"
  VECTOPLAN_LIBRARY_STARTUP_STRICT: "${VECTOPLAN_LIBRARY_STARTUP_STRICT:-false}"
  VECTOPLAN_LIBRARY_STRICT_TEMPLATE_CHECKS: "${VECTOPLAN_LIBRARY_STRICT_TEMPLATE_CHECKS:-false}"

  # ---------------------------------------------------------------------------
  # PostgreSQL / SQLAlchemy / Flask-Migrate
  # ---------------------------------------------------------------------------
  # SQLAlchemy liest primär SQLALCHEMY_DATABASE_URI.
  # Zusätzliche Aliase bleiben gesetzt, damit ältere und neue Config-Schichten
  # dieselbe Verbindung nutzen.
  #
  # Für lokale Entwicklung sind Auto-Init, Auto-Migrate und Auto-Upgrade aktiv.
  # Später in produktiveren Umgebungen:
  #   VECTOPLAN_LIBRARY_DB_AUTO_INIT=false
  #   VECTOPLAN_LIBRARY_DB_AUTO_MIGRATE=false
  #   VECTOPLAN_LIBRARY_DB_AUTO_UPGRADE=true
  # ---------------------------------------------------------------------------

  FLASK_APP: "${VECTOPLAN_LIBRARY_FLASK_APP:-wsgi:app}"
  FLASK_ENV: "${VECTOPLAN_LIBRARY_FLASK_ENV:-development}"

  VECTOPLAN_LIBRARY_DATABASE_DRIVER: "${VECTOPLAN_LIBRARY_DATABASE_DRIVER:-postgresql+psycopg}"
  VECTOPLAN_LIBRARY_DB_HOST: "${VECTOPLAN_LIBRARY_DB_HOST:-vectoplan-library-db}"
  VECTOPLAN_LIBRARY_DB_PORT: "${VECTOPLAN_LIBRARY_DB_PORT:-5432}"
  VECTOPLAN_LIBRARY_DB_NAME: "${VECTOPLAN_LIBRARY_DB_NAME:-vectoplan_library}"
  VECTOPLAN_LIBRARY_DB_USER: "${VECTOPLAN_LIBRARY_DB_USER:-vectoplan}"
  VECTOPLAN_LIBRARY_DB_PASSWORD: "${VECTOPLAN_LIBRARY_DB_PASSWORD:-vectoplan}"

  VECTOPLAN_LIBRARY_DATABASE_URI: "${VECTOPLAN_LIBRARY_DATABASE_URI:-postgresql+psycopg://vectoplan:vectoplan@vectoplan-library-db:5432/vectoplan_library}"
  VECTOPLAN_LIBRARY_DATABASE_URL: "${VECTOPLAN_LIBRARY_DATABASE_URL:-postgresql+psycopg://vectoplan:vectoplan@vectoplan-library-db:5432/vectoplan_library}"
  VPLIB_DATABASE_URL: "${VPLIB_DATABASE_URL:-postgresql+psycopg://vectoplan:vectoplan@vectoplan-library-db:5432/vectoplan_library}"
  SQLALCHEMY_DATABASE_URI: "${SQLALCHEMY_DATABASE_URI:-postgresql+psycopg://vectoplan:vectoplan@vectoplan-library-db:5432/vectoplan_library}"
  DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://vectoplan:vectoplan@vectoplan-library-db:5432/vectoplan_library}"

  SQLALCHEMY_TRACK_MODIFICATIONS: "${VECTOPLAN_LIBRARY_SQLALCHEMY_TRACK_MODIFICATIONS:-false}"
  SQLALCHEMY_ECHO: "${VECTOPLAN_LIBRARY_SQLALCHEMY_ECHO:-false}"
  SQLALCHEMY_RECORD_QUERIES: "${VECTOPLAN_LIBRARY_SQLALCHEMY_RECORD_QUERIES:-false}"

  VECTOPLAN_LIBRARY_DATABASE_REQUIRED: "${VECTOPLAN_LIBRARY_DATABASE_REQUIRED:-true}"
  VECTOPLAN_LIBRARY_DB_HEALTH_CHECK: "${VECTOPLAN_LIBRARY_DB_HEALTH_CHECK:-false}"

  VECTOPLAN_LIBRARY_DB_POOL_PRE_PING: "${VECTOPLAN_LIBRARY_DB_POOL_PRE_PING:-true}"
  VECTOPLAN_LIBRARY_DB_POOL_RECYCLE_SECONDS: "${VECTOPLAN_LIBRARY_DB_POOL_RECYCLE_SECONDS:-1800}"
  VECTOPLAN_LIBRARY_DB_POOL_SIZE: "${VECTOPLAN_LIBRARY_DB_POOL_SIZE:-5}"
  VECTOPLAN_LIBRARY_DB_MAX_OVERFLOW: "${VECTOPLAN_LIBRARY_DB_MAX_OVERFLOW:-10}"
  VECTOPLAN_LIBRARY_DB_POOL_TIMEOUT_SECONDS: "${VECTOPLAN_LIBRARY_DB_POOL_TIMEOUT_SECONDS:-30}"
  VECTOPLAN_LIBRARY_DATABASE_CONNECT_TIMEOUT: "${VECTOPLAN_LIBRARY_DATABASE_CONNECT_TIMEOUT:-15}"

  VECTOPLAN_LIBRARY_MIGRATIONS_DIRECTORY: "${VECTOPLAN_LIBRARY_MIGRATIONS_DIRECTORY:-migrations}"
  ALEMBIC_MIGRATIONS_DIRECTORY: "${ALEMBIC_MIGRATIONS_DIRECTORY:-migrations}"
  MIGRATIONS_DIRECTORY: "${MIGRATIONS_DIRECTORY:-migrations}"

  VECTOPLAN_LIBRARY_DB_WAIT_FOR_READY: "${VECTOPLAN_LIBRARY_DB_WAIT_FOR_READY:-true}"
  VECTOPLAN_LIBRARY_DB_WAIT_TIMEOUT: "${VECTOPLAN_LIBRARY_DB_WAIT_TIMEOUT:-60}"
  VECTOPLAN_LIBRARY_DB_WAIT_INTERVAL: "${VECTOPLAN_LIBRARY_DB_WAIT_INTERVAL:-2}"

  VECTOPLAN_LIBRARY_DB_BOOTSTRAP_ENABLED: "${VECTOPLAN_LIBRARY_DB_BOOTSTRAP_ENABLED:-true}"
  VECTOPLAN_LIBRARY_DB_AUTO_INIT: "${VECTOPLAN_LIBRARY_DB_AUTO_INIT:-true}"
  VECTOPLAN_LIBRARY_DB_AUTO_MIGRATE: "${VECTOPLAN_LIBRARY_DB_AUTO_MIGRATE:-true}"
  VECTOPLAN_LIBRARY_DB_AUTO_UPGRADE: "${VECTOPLAN_LIBRARY_DB_AUTO_UPGRADE:-true}"
  VECTOPLAN_LIBRARY_DB_MIGRATION_STRICT: "${VECTOPLAN_LIBRARY_DB_MIGRATION_STRICT:-true}"
  VECTOPLAN_LIBRARY_DB_RECREATE_INCOMPLETE_MIGRATIONS: "${VECTOPLAN_LIBRARY_DB_RECREATE_INCOMPLETE_MIGRATIONS:-true}"
  VECTOPLAN_LIBRARY_DB_AUTO_MIGRATE_MESSAGE: "${VECTOPLAN_LIBRARY_DB_AUTO_MIGRATE_MESSAGE:-auto creative library migration}"

  # Legacy-/Startup-Schalter bleiben vorhanden, aber die neue App-Factory führt
  # keine automatische Tabellenanlage beim Import aus.
  VECTOPLAN_LIBRARY_DB_AUTO_CREATE: "${VECTOPLAN_LIBRARY_DB_AUTO_CREATE:-false}"
  VECTOPLAN_LIBRARY_DB_AUTO_SEED: "${VECTOPLAN_LIBRARY_DB_AUTO_SEED:-false}"
  VECTOPLAN_LIBRARY_DB_SEED_ON_EMPTY_ONLY: "${VECTOPLAN_LIBRARY_DB_SEED_ON_EMPTY_ONLY:-true}"
  VECTOPLAN_LIBRARY_DB_DROP_ALL_ON_BOOT: "${VECTOPLAN_LIBRARY_DB_DROP_ALL_ON_BOOT:-false}"
  VECTOPLAN_LIBRARY_DB_REQUIRE_READY: "${VECTOPLAN_LIBRARY_DB_REQUIRE_READY:-true}"
  VECTOPLAN_LIBRARY_DB_ENABLE_SQLITE_FOREIGN_KEYS: "${VECTOPLAN_LIBRARY_DB_ENABLE_SQLITE_FOREIGN_KEYS:-true}"
  VECTOPLAN_LIBRARY_DB_DEFAULT_SLOT_COUNT: "${VECTOPLAN_LIBRARY_DB_DEFAULT_SLOT_COUNT:-9}"
  VECTOPLAN_LIBRARY_DB_SEED_MODULE: "${VECTOPLAN_LIBRARY_DB_SEED_MODULE:-services.database_seed_service}"

  # ---------------------------------------------------------------------------
  # VPLIB Kern-API
  # ---------------------------------------------------------------------------

  VPLIB_SERVICE_ROOT: "/opt/vectoplan/services/vectoplan-library"
  VPLIB_SRC_ROOT: "/opt/vectoplan/services/vectoplan-library/src"
  VPLIB_SOURCE_ROOT: "/opt/vectoplan/services/vectoplan-library/sources"
  VPLIB_LIBRARY_CATALOG_ROOT: "/opt/vectoplan/services/vectoplan-library/creative_library"
  VPLIB_GENERATED_ROOT: "/opt/vectoplan/services/vectoplan-library/generated/vplib"
  VPLIB_ARCHIVE_ROOT: "/opt/vectoplan/services/vectoplan-library/generated/archives"
  VPLIB_TEST_OUTPUT_ROOT: "/opt/vectoplan/services/vectoplan-library/generated/vplib_test"
  VPLIB_ROUTE_PREFIX: "/api/v1/vplib"
  VPLIB_DRY_RUN_DEFAULT: "${VPLIB_DRY_RUN_DEFAULT:-true}"
  VPLIB_TEST_ROUTE_ENABLED: "${VPLIB_TEST_ROUTE_ENABLED:-true}"
  VPLIB_CREATE_ROUTE_ENABLED: "${VPLIB_CREATE_ROUTE_ENABLED:-true}"
  VPLIB_CREATE_WRITE_ENABLED: "${VPLIB_CREATE_WRITE_ENABLED:-true}"
  VPLIB_CREATE_OVERWRITE_ENABLED: "${VPLIB_CREATE_OVERWRITE_ENABLED:-false}"
  VPLIB_DEFAULT_WRITE_MODE: "${VPLIB_DEFAULT_WRITE_MODE:-fail}"
  VPLIB_DEFAULT_VALIDATION_MODE: "${VPLIB_DEFAULT_VALIDATION_MODE:-strict}"

  # ---------------------------------------------------------------------------
  # Dateibasierte Creative-Library-Schicht
  # ---------------------------------------------------------------------------

  VECTOPLAN_LIBRARY_SERVICE_ROOT: "/opt/vectoplan/services/vectoplan-library"
  VECTOPLAN_LIBRARY_SRC_ROOT: "/opt/vectoplan/services/vectoplan-library/src"
  VECTOPLAN_LIBRARY_PACKAGE_ROOT: "/opt/vectoplan/services/vectoplan-library/src/library"
  VECTOPLAN_LIBRARY_SOURCE_ROOT: "/opt/vectoplan/services/vectoplan-library/src/library/source"
  VECTOPLAN_LIBRARY_CREATIVE_ROOT: "/opt/vectoplan/services/vectoplan-library/creative_library"
  VECTOPLAN_LIBRARY_GENERATED_ROOT: "/opt/vectoplan/services/vectoplan-library/generated/library"
  VECTOPLAN_LIBRARY_CACHE_ROOT: "/opt/vectoplan/services/vectoplan-library/generated/library_cache"

  LIBRARY_SERVICE_ROOT: "/opt/vectoplan/services/vectoplan-library"
  LIBRARY_SRC_ROOT: "/opt/vectoplan/services/vectoplan-library/src"
  LIBRARY_PACKAGE_ROOT: "/opt/vectoplan/services/vectoplan-library/src/library"
  LIBRARY_SOURCE_ROOT: "/opt/vectoplan/services/vectoplan-library/src/library/source"
  LIBRARY_CREATIVE_ROOT: "/opt/vectoplan/services/vectoplan-library/creative_library"
  LIBRARY_GENERATED_ROOT: "/opt/vectoplan/services/vectoplan-library/generated/library"
  LIBRARY_CACHE_ROOT: "/opt/vectoplan/services/vectoplan-library/generated/library_cache"

  VECTOPLAN_LIBRARY_ROUTE_PREFIX: "/api/v1/vplib/library"
  VPLIB_LIBRARY_ROUTE_PREFIX: "/api/v1/vplib/library"
  LIBRARY_ROUTE_PREFIX: "/api/v1/vplib/library"

  VECTOPLAN_LIBRARY_SCAN_RECURSIVE: "${VECTOPLAN_LIBRARY_SCAN_RECURSIVE:-true}"
  VECTOPLAN_LIBRARY_SCAN_MAX_DEPTH: "${VECTOPLAN_LIBRARY_SCAN_MAX_DEPTH:-12}"
  VECTOPLAN_LIBRARY_SCAN_FOLLOW_SYMLINKS: "${VECTOPLAN_LIBRARY_SCAN_FOLLOW_SYMLINKS:-false}"
  VECTOPLAN_LIBRARY_INCLUDE_INVALID_IN_SCAN: "${VECTOPLAN_LIBRARY_INCLUDE_INVALID_IN_SCAN:-true}"
  VECTOPLAN_LIBRARY_AUTO_SCAN_ON_REQUEST: "${VECTOPLAN_LIBRARY_AUTO_SCAN_ON_REQUEST:-true}"
  VECTOPLAN_LIBRARY_FAIL_ON_DUPLICATE_IDS: "${VECTOPLAN_LIBRARY_FAIL_ON_DUPLICATE_IDS:-true}"
  VECTOPLAN_LIBRARY_TREAT_MISSING_SOURCE_ROOT_AS_EMPTY: "${VECTOPLAN_LIBRARY_TREAT_MISSING_SOURCE_ROOT_AS_EMPTY:-true}"

  VECTOPLAN_LIBRARY_LIST_INCLUDE_INVALID: "${VECTOPLAN_LIBRARY_LIST_INCLUDE_INVALID:-false}"
  VECTOPLAN_LIBRARY_DETAIL_INCLUDE_RAW_DOCUMENTS: "${VECTOPLAN_LIBRARY_DETAIL_INCLUDE_RAW_DOCUMENTS:-true}"
  VECTOPLAN_LIBRARY_DETAIL_INCLUDE_VALIDATION_REPORT: "${VECTOPLAN_LIBRARY_DETAIL_INCLUDE_VALIDATION_REPORT:-true}"

  VECTOPLAN_LIBRARY_CACHE_ENABLED: "${VECTOPLAN_LIBRARY_CACHE_ENABLED:-false}"
  VECTOPLAN_LIBRARY_CACHE_TTL_SECONDS: "${VECTOPLAN_LIBRARY_CACHE_TTL_SECONDS:-5}"

  VECTOPLAN_LIBRARY_ALLOWED_MANIFEST_FILENAMES: "${VECTOPLAN_LIBRARY_ALLOWED_MANIFEST_FILENAMES:-vplib.manifest.json}"
  VECTOPLAN_LIBRARY_IGNORED_DIRECTORY_NAMES: "${VECTOPLAN_LIBRARY_IGNORED_DIRECTORY_NAMES:-__pycache__,.git,.hg,.svn,.idea,.vscode,.pytest_cache,.mypy_cache,.ruff_cache,node_modules,venv,.venv,dist,build}"
