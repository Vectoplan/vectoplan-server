services:
  vectoplan-editor:
    container_name: vectoplan-editor

    build:
      context: ./services/vectoplan-editor
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: /opt/vectoplan/services/vectoplan-editor
        APP_USER: vectoplan
        APP_UID: "${VECTOPLAN_EDITOR_UID:-10001}"
        APP_GID: "${VECTOPLAN_EDITOR_GID:-10001}"

    init: true
    restart: unless-stopped
    working_dir: /opt/vectoplan/services/vectoplan-editor
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-editor-environment

    depends_on:
      vectoplan-chunk:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_EDITOR_PUBLIC_PORT:-5000}:5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:5000/editor', timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - vectoplan-net

    # volumes:
    #   - ./services/vectoplan-editor:/opt/vectoplan/services/vectoplan-editor:rw

  vectoplan-library-db:
    container_name: vectoplan-library-db
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-library-postgres-environment

    ports:
      - "${VECTOPLAN_LIBRARY_POSTGRES_PUBLIC_PORT:-5432}:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    volumes:
      - vectoplan-library-postgres-data:/var/lib/postgresql/data

    networks:
      - vectoplan-net

  vectoplan-library:
    container_name: vectoplan-library

    build:
      context: ./services/vectoplan-library
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: /opt/vectoplan/services/vectoplan-library
        APP_USER: vectoplan
        APP_UID: "${VECTOPLAN_LIBRARY_UID:-10002}"
        APP_GID: "${VECTOPLAN_LIBRARY_GID:-10002}"

    init: true
    restart: unless-stopped
    working_dir: /opt/vectoplan/services/vectoplan-library
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-library-environment

    depends_on:
      vectoplan-library-db:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_LIBRARY_PUBLIC_PORT:-5001}:5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:5000/health/ready', timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 90s
    volumes:
      - ./services/vectoplan-library:/opt/vectoplan/services/vectoplan-library
    networks:
      - vectoplan-net

    # Für lokale Entwicklung optional aktivieren.
    # Achtung:
    # Wenn du migrations/ im Host persistieren willst, den zweiten Mount
    # ebenfalls aktivieren. Sonst werden automatisch erzeugte Migrationen nur
    # im Container-Dateisystem gehalten.
    #
    # volumes:
    #   - ./services/vectoplan-library:/opt/vectoplan/services/vectoplan-library:rw
    #   - ./services/vectoplan-library/migrations:/opt/vectoplan/services/vectoplan-library/migrations:rw

  vectoplan-chunk-db:
    container_name: vectoplan-chunk-db
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-chunk-postgres-environment

    ports:
      - "${VECTOPLAN_CHUNK_POSTGRES_PUBLIC_PORT:-5433}:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    volumes:
      - vectoplan-chunk-postgres-data:/var/lib/postgresql/data

    networks:
      - vectoplan-net

  vectoplan-chunk:
    container_name: vectoplan-chunk

    build:
      context: ./services/vectoplan-chunk
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: /opt/vectoplan/services/vectoplan-chunk
        APP_USER: vectoplan
        APP_UID: "${VECTOPLAN_CHUNK_UID:-10003}"
        APP_GID: "${VECTOPLAN_CHUNK_GID:-10003}"

    init: true
    restart: unless-stopped
    working_dir: /opt/vectoplan/services/vectoplan-chunk
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-chunk-environment

    depends_on:
      vectoplan-chunk-db:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_CHUNK_PUBLIC_PORT:-5002}:5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, sys, urllib.request; path = os.environ.get('VECTOPLAN_CHUNK_HEALTHCHECK_PATH', '/projects/_status'); resp = urllib.request.urlopen('http://127.0.0.1:5000' + path, timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 45s

    networks:
      - vectoplan-net

    # volumes:
    #   - ./services/vectoplan-chunk:/opt/vectoplan/services/vectoplan-chunk:rw


volumes:
  vectoplan-library-postgres-data:
    name: vectoplan-library-postgres-data

  vectoplan-chunk-postgres-data:
    name: vectoplan-chunk-postgres-data


networks:
  vectoplan-net:
    name: vectoplan-net
    driver: bridge