x-geoserver-orchestrator-runtime-environment: &geoserver_orchestrator_runtime_environment
  <<: *geoserver_orchestrator_common_environment

  APP_STARTUP_MODE: "runtime"
  WSGI_STARTUP_MODE: "runtime"
  SERVICE_STARTUP_MODE: "runtime"
  STARTUP_MODE: "runtime"

  DB_HEALTHCHECK_ON_STARTUP: "true"
  GEOSERVER_HEALTHCHECK_ON_STARTUP: "true"

  APP_CREATE_ON_IMPORT: "false"
  APP_USE_CACHE: "true"
  APP_REGISTER_DEFAULT_ROUTES: "true"
  APP_RUN_STARTUP_TASKS: "false"

  WSGI_USE_APP_CACHE: "true"
  WSGI_REGISTER_DEFAULT_ROUTES: "true"
  WSGI_RUN_STARTUP_TASKS: "false"
  WSGI_FORCE_REBUILD: "false"


# ------------------------------------------------------------------------------
# Services
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# Services
# ------------------------------------------------------------------------------

services:

  vectoplan-editor:
    container_name: vectoplan-editor

    build:
      context: ./services/vectoplan-editor
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: /opt/vectoplan/services/vectoplan-editor
        APP_USER: vectoplan
        APP_UID: "${VECTOPLAN_EDITOR_UID:-10001}"
        APP_GID: "${VECTOPLAN_EDITOR_GID:-10001}"

    init: true
    restart: unless-stopped
    working_dir: /opt/vectoplan/services/vectoplan-editor
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-editor-environment

    depends_on:
      vectoplan-chunk:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_EDITOR_PUBLIC_PORT:-5000}:5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:5000/editor', timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    networks:
      - vectoplan-net

    # volumes:
    #   - ./services/vectoplan-editor:/opt/vectoplan/services/vectoplan-editor:rw

  vectoplan-library-db:
    container_name: vectoplan-library-db
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-library-postgres-environment

    ports:
      - "${VECTOPLAN_LIBRARY_POSTGRES_PUBLIC_PORT:-5432}:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    volumes:
      - vectoplan-library-postgres-data:/var/lib/postgresql/data

    networks:
      - vectoplan-net

  vectoplan-library:
    container_name: vectoplan-library

    build:
      context: ./services/vectoplan-library
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: /opt/vectoplan/services/vectoplan-library
        APP_USER: vectoplan
        APP_UID: "${VECTOPLAN_LIBRARY_UID:-10002}"
        APP_GID: "${VECTOPLAN_LIBRARY_GID:-10002}"

    init: true
    restart: unless-stopped
    working_dir: /opt/vectoplan/services/vectoplan-library
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-library-environment

    depends_on:
      vectoplan-library-db:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_LIBRARY_PUBLIC_PORT:-5001}:5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:5000/health/ready', timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 90s
    volumes:
      - ./services/vectoplan-library:/opt/vectoplan/services/vectoplan-library
    networks:
      - vectoplan-net

    # Für lokale Entwicklung optional aktivieren.
    # Achtung:
    # Wenn du migrations/ im Host persistieren willst, den zweiten Mount
    # ebenfalls aktivieren. Sonst werden automatisch erzeugte Migrationen nur
    # im Container-Dateisystem gehalten.
    #
    # volumes:
    #   - ./services/vectoplan-library:/opt/vectoplan/services/vectoplan-library:rw
    #   - ./services/vectoplan-library/migrations:/opt/vectoplan/services/vectoplan-library/migrations:rw

  vectoplan-chunk-db:
    container_name: vectoplan-chunk-db
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-chunk-postgres-environment

    ports:
      - "${VECTOPLAN_CHUNK_POSTGRES_PUBLIC_PORT:-5433}:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    volumes:
      - vectoplan-chunk-postgres-data:/var/lib/postgresql/data

    networks:
      - vectoplan-net

  vectoplan-chunk:
    container_name: vectoplan-chunk

    build:
      context: ./services/vectoplan-chunk
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: /opt/vectoplan/services/vectoplan-chunk
        APP_USER: vectoplan
        APP_UID: "${VECTOPLAN_CHUNK_UID:-10003}"
        APP_GID: "${VECTOPLAN_CHUNK_GID:-10003}"

    init: true
    restart: unless-stopped
    working_dir: /opt/vectoplan/services/vectoplan-chunk
    stop_signal: SIGTERM
    stop_grace_period: 30s

    environment:
      <<: *vectoplan-chunk-environment

    depends_on:
      vectoplan-chunk-db:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_CHUNK_PUBLIC_PORT:-5002}:5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, sys, urllib.request; path = os.environ.get('VECTOPLAN_CHUNK_HEALTHCHECK_PATH', '/projects/_status'); resp = urllib.request.urlopen('http://127.0.0.1:5000' + path, timeout=3); sys.exit(0 if 200 <= getattr(resp, 'status', 200) < 400 else 1)\""
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 45s

    networks:
      - vectoplan-net

    # volumes:
    #   - ./services/vectoplan-chunk:/opt/vectoplan/services/vectoplan-chunk:rw


  # --------------------------------------------------------------------------
  # Geo Stack
  # --------------------------------------------------------------------------

  vectoplan-geo-db:
    container_name: vectoplan-geo-db
    image: postgis/postgis:16-3.5
    restart: unless-stopped

    environment:
      POSTGRES_DB: "${PG_ADMIN_DB:-postgres}"
      POSTGRES_USER: "${PG_ADMIN_USER:-postgres}"
      POSTGRES_PASSWORD: "${PG_ADMIN_PASSWORD:-postgres}"

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 10

    ports:
      - "${VECTOPLAN_GEO_POSTGRES_PUBLIC_PORT:-5434}:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - vectoplan-net


  db-postgis-init:
    container_name: vectoplan-geo-db-postgis-init
    image: postgis/postgis:16-3.5
    restart: "no"

    environment:
      POSTGRES_DB: "${PG_ADMIN_DB:-postgres}"
      POSTGRES_USER: "${PG_ADMIN_USER:-postgres}"
      POSTGRES_PASSWORD: "${PG_ADMIN_PASSWORD:-postgres}"

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -lc

    command: |
      export PGPASSWORD="$${POSTGRES_PASSWORD}"

      until pg_isready -h vectoplan-geo-db -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"; do
        echo "Warte auf PostgreSQL..."
        sleep 2
      done

      psql -h vectoplan-geo-db -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 <<'SQL'
      CREATE EXTENSION IF NOT EXISTS postgis;
      CREATE SCHEMA IF NOT EXISTS raw;
      CREATE SCHEMA IF NOT EXISTS pub;
      CREATE SCHEMA IF NOT EXISTS edit;
      CREATE SCHEMA IF NOT EXISTS meta;
      SQL

      echo "PostGIS und Schemas wurden sichergestellt."

    networks:
      - vectoplan-net


  geoserver:
    container_name: vectoplan-geoserver
    image: docker.osgeo.org/geoserver:2.28.3
    restart: unless-stopped

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy

    environment:
      SKIP_DEMO_DATA: "true"
      WEBAPP_CONTEXT: "geoserver"
      ROOT_WEBAPP_REDIRECT: "true"
      PROXY_BASE_URL: "http://localhost:8082/geoserver"

      GEOSERVER_ADMIN_USER: "${GEOSERVER_ADMIN_USER:-admin}"
      GEOSERVER_ADMIN_PASSWORD: "${GEOSERVER_ADMIN_PASSWORD:-geoserver}"

      RUN_UNPRIVILEGED: "true"
      RUN_WITH_USER_UID: "10001"
      RUN_WITH_USER_GID: "10001"
      CHANGE_OWNERSHIP_ON_FOLDERS: "/opt /opt/geoserver_data"

      EXTRA_JAVA_OPTS: "${GEOSERVER_EXTRA_JAVA_OPTS:--Xms512m -Xmx1024m}"
      HEALTHCHECK_URL: "http://127.0.0.1:8080/geoserver/rest/about/version.json"

    volumes:
      - geoserver_data:/opt/geoserver_data

    ports:
      - "${GEOSERVER_PUBLIC_PORT:-8082}:8080"

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS -u "$$GEOSERVER_ADMIN_USER:$$GEOSERVER_ADMIN_PASSWORD"
          -H "Accept: application/json"
          "$$HEALTHCHECK_URL"
          >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - vectoplan-net


  geoserver-orchestrator-db-init:
    container_name: vectoplan-geoserver-orchestrator-db-init
    build: *geoserver_orchestrator_build
    restart: "no"

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy
      db-postgis-init:
        condition: service_completed_successfully

    environment: *geoserver_orchestrator_db_init_environment
    volumes: *geoserver_orchestrator_volumes

    networks:
      - vectoplan-net


  geoserver-orchestrator-sync-init:
    container_name: vectoplan-geoserver-orchestrator-sync-init
    profiles:
      - geo-sync
    build: *geoserver_orchestrator_build
    restart: "no"

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy
      geoserver:
        condition: service_healthy
      geoserver-orchestrator-db-init:
        condition: service_completed_successfully

    environment: *geoserver_orchestrator_sync_init_environment
    volumes: *geoserver_orchestrator_volumes

    networks:
      - vectoplan-net


  geoserver-orchestrator:
    container_name: vectoplan-geoserver-orchestrator
    build: *geoserver_orchestrator_build
    restart: unless-stopped

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy
      geoserver:
        condition: service_healthy
      geoserver-orchestrator-db-init:
        condition: service_completed_successfully

    environment: *geoserver_orchestrator_runtime_environment
    volumes: *geoserver_orchestrator_volumes

    ports:
      - "${GEOSERVER_ORCHESTRATOR_PUBLIC_PORT:-8010}:8010"

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS "http://127.0.0.1:8010/health/ready" >/dev/null 2>&1 ||
          curl -fsS "http://127.0.0.1:8010/health/live" >/dev/null 2>&1 ||
          curl -fsS "http://127.0.0.1:8010/health" >/dev/null 2>&1 ||
          exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - vectoplan-net


  openlayer:
    container_name: vectoplan-openlayer

    build:
      context: ./services/vectoplan-openLayer
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      HOST: "0.0.0.0"
      OPENLAYER_PORT: "8090"
      LOG_LEVEL: "${OPENLAYER_LOG_LEVEL:-INFO}"

      GEOSERVER_ORCHESTRATOR_URL: "http://geoserver-orchestrator:8010"
      GEOSERVER_INTERNAL_URL: "http://geoserver:8080/geoserver"
      GEOSERVER_PUBLIC_URL: "http://localhost:8082/geoserver"

      MAPBOX_ACCESS_TOKEN: "${MAPBOX_ACCESS_TOKEN:-}"
      MAPBOX_STYLE_URL: "${MAPBOX_STYLE_URL:-}"

    depends_on:
      geoserver-orchestrator:
        condition: service_healthy

    ports:
      - "${OPENLAYER_PUBLIC_PORT:-8090}:8090"

    expose:
      - "8090"

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS "http://127.0.0.1:8090/ready" >/dev/null 2>&1 ||
          curl -fsS "http://127.0.0.1:8090/health" >/dev/null 2>&1 ||
          curl -fsS "http://127.0.0.1:8090/" >/dev/null 2>&1 ||
          exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - vectoplan-net


