services:
  vectoplan-library-db:
    <<: *vectoplan-service-defaults
    image: postgres:16-alpine
    environment:
      <<: *vectoplan-library-postgres-environment
    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_LIBRARY_POSTGRES_PUBLIC_PORT:-15432}:5432"
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: "${VECTOPLAN_LIBRARY_DB_HEALTH_INTERVAL:-10s}"
      timeout: "${VECTOPLAN_LIBRARY_DB_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_LIBRARY_DB_HEALTH_RETRIES:-10}
      start_period: "${VECTOPLAN_LIBRARY_DB_HEALTH_START_PERIOD:-10s}"
    volumes:
      - vectoplan-library-postgres-data:/var/lib/postgresql/data
    networks:
      vectoplan-net:
        aliases:
          - vectoplan-library-db
          - library-db

  vectoplan-library:
    <<: *vectoplan-service-defaults
    build:
      context: ./services/vectoplan-library
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: "/opt/vectoplan/services/vectoplan-library"
        APP_USER: "vectoplan"
        APP_UID: "${VECTOPLAN_LIBRARY_UID:-10002}"
        APP_GID: "${VECTOPLAN_LIBRARY_GID:-10002}"

    working_dir: /opt/vectoplan/services/vectoplan-library

    environment:
      <<: *vectoplan-library-environment

    depends_on:
      vectoplan-library-db:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -ec

    command:
      - |
        set -eu

        cd /opt/vectoplan/services/vectoplan-library

        if [ ! -f ./entrypoint.sh ]; then
          echo "[vectoplan-library] ERROR: ./entrypoint.sh wurde im Arbeitsverzeichnis nicht gefunden." >&2
          echo "[vectoplan-library] PWD: $(pwd)" >&2
          echo "[vectoplan-library] Inhalt:" >&2
          ls -la >&2 || true
          exit 1
        fi

        sed -i 's/\r$//' ./entrypoint.sh 2>/dev/null || true
        chmod +x ./entrypoint.sh 2>/dev/null || true

        exec /bin/sh ./entrypoint.sh

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_LIBRARY_PUBLIC_PORT:-5101}:5000"

    expose:
      - "5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport sys, urllib.request\nfor path in ('/health/ready', '/health/live', '/health', '/'):\n    try:\n        resp = urllib.request.urlopen('http://127.0.0.1:5000' + path, timeout=3)\n        status = getattr(resp, 'status', 200)\n        if 200 <= status < 500:\n            sys.exit(0)\n    except Exception:\n        pass\nsys.exit(1)\nPY"
        ]
      interval: "${VECTOPLAN_LIBRARY_HEALTH_INTERVAL:-20s}"
      timeout: "${VECTOPLAN_LIBRARY_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_LIBRARY_HEALTH_RETRIES:-10}
      start_period: "${VECTOPLAN_LIBRARY_HEALTH_START_PERIOD:-90s}"

    volumes:
      - ./services/vectoplan-library:/opt/vectoplan/services/vectoplan-library:rw

    networks:
      vectoplan-net:
        aliases:
          - vectoplan-library
          - library
      vectoplan-shared:
        aliases:
          - vectoplan-library
          - server-library

  vectoplan-chunk-db:
    <<: *vectoplan-service-defaults
    image: postgres:16-alpine
    environment:
      <<: *vectoplan-chunk-postgres-environment
    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_CHUNK_POSTGRES_PUBLIC_PORT:-15433}:5432"
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: "${VECTOPLAN_CHUNK_DB_HEALTH_INTERVAL:-10s}"
      timeout: "${VECTOPLAN_CHUNK_DB_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_CHUNK_DB_HEALTH_RETRIES:-10}
      start_period: "${VECTOPLAN_CHUNK_DB_HEALTH_START_PERIOD:-10s}"
    volumes:
      - vectoplan-chunk-postgres-data:/var/lib/postgresql/data
    networks:
      vectoplan-net:
        aliases:
          - vectoplan-chunk-db
          - chunk-db

  vectoplan-chunk:
    <<: *vectoplan-service-defaults
    build:
      context: ./services/vectoplan-chunk
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: "/opt/vectoplan/services/vectoplan-chunk"
        APP_USER: "vectoplan"
        APP_UID: "${VECTOPLAN_CHUNK_UID:-10003}"
        APP_GID: "${VECTOPLAN_CHUNK_GID:-10003}"

    working_dir: /opt/vectoplan/services/vectoplan-chunk

    environment:
      <<: *vectoplan-chunk-environment

    depends_on:
      vectoplan-chunk-db:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_CHUNK_PUBLIC_PORT:-5102}:5000"

    expose:
      - "5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport os, sys, urllib.request\npaths = [p.strip() for p in os.environ.get('VECTOPLAN_CHUNK_HEALTHCHECK_PATH', '/projects/_status').split(',') if p.strip()]\npaths.extend(['/projects/_status', '/chunks/_status', '/commands/_status', '/'])\nseen = []\nfor path in paths:\n    if path in seen:\n        continue\n    seen.append(path)\n    try:\n        resp = urllib.request.urlopen('http://127.0.0.1:5000' + path, timeout=3)\n        status = getattr(resp, 'status', 200)\n        if 200 <= status < 500:\n            sys.exit(0)\n    except Exception:\n        pass\nsys.exit(1)\nPY"
        ]
      interval: "${VECTOPLAN_CHUNK_HEALTH_INTERVAL:-20s}"
      timeout: "${VECTOPLAN_CHUNK_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_CHUNK_HEALTH_RETRIES:-8}
      start_period: "${VECTOPLAN_CHUNK_HEALTH_START_PERIOD:-45s}"

    networks:
      vectoplan-net:
        aliases:
          - vectoplan-chunk
          - chunk
      vectoplan-shared:
        aliases:
          - vectoplan-chunk
          - server-chunk

  vectoplan-editor:
    <<: *vectoplan-service-defaults
    build:
      context: ./services/vectoplan-editor
      dockerfile: Dockerfile
      target: runtime
      args:
        APP_HOME: "/opt/vectoplan/services/vectoplan-editor"
        APP_USER: "vectoplan"
        APP_UID: "${VECTOPLAN_EDITOR_UID:-10001}"
        APP_GID: "${VECTOPLAN_EDITOR_GID:-10001}"

    working_dir: /opt/vectoplan/services/vectoplan-editor

    environment:
      <<: *vectoplan-editor-environment

    depends_on:
      vectoplan-library:
        condition: service_healthy
      vectoplan-chunk:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_EDITOR_PUBLIC_PORT:-5100}:5000"

    expose:
      - "5000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport sys, urllib.request\nfor path in ('/editor', '/editor?embed=1', '/'):\n    try:\n        resp = urllib.request.urlopen('http://127.0.0.1:5000' + path, timeout=3)\n        status = getattr(resp, 'status', 200)\n        if 200 <= status < 500:\n            sys.exit(0)\n    except Exception:\n        pass\nsys.exit(1)\nPY"
        ]
      interval: "${VECTOPLAN_EDITOR_HEALTH_INTERVAL:-30s}"
      timeout: "${VECTOPLAN_EDITOR_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_EDITOR_HEALTH_RETRIES:-5}
      start_period: "${VECTOPLAN_EDITOR_HEALTH_START_PERIOD:-30s}"

    networks:
      vectoplan-net:
        aliases:
          - vectoplan-editor
          - editor
      vectoplan-shared:
        aliases:
          - vectoplan-editor
          - server-editor

  vectoplan-app-db:
    <<: *vectoplan-service-defaults
    image: postgres:16-alpine

    environment:
      <<: *vectoplan-app-postgres-environment

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_APP_POSTGRES_PUBLIC_PORT:-15435}:5432"

    expose:
      - "5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: "${VECTOPLAN_APP_DB_HEALTH_INTERVAL:-10s}"
      timeout: "${VECTOPLAN_APP_DB_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_APP_DB_HEALTH_RETRIES:-10}
      start_period: "${VECTOPLAN_APP_DB_HEALTH_START_PERIOD:-10s}"

    volumes:
      - vectoplan-app-postgres-data:/var/lib/postgresql/data

    networks:
      vectoplan-net:
        aliases:
          - vectoplan-app-db
          - app-db

  vectoplan-app:
    <<: *vectoplan-service-defaults

    build:
      context: ./services/vectoplan-app
      dockerfile: Dockerfile

    working_dir: /app

    environment:
      <<: *vectoplan-app-environment

    # Bewusst weich gehalten:
    # - Die App ist Portal-/Shell-Service.
    # - Editor/OpenLayer werden per Browser-iframe geladen.
    # - Wenn Editor oder Map kurz nicht erreichbar sind, soll die App trotzdem starten.
    # - Die Workspace-Routen zeigen dann später einen Fallback statt die App hart zu blockieren.
    depends_on:
      vectoplan-app-db:
        condition: service_healthy
      vectoplan-library:
        condition: service_healthy
      vectoplan-chunk:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -ec

    command:
      - |
        set -eu

        cd /app

        if [ ! -f ./entrypoint.sh ]; then
          echo "[vectoplan-app] ERROR: ./entrypoint.sh wurde im Arbeitsverzeichnis nicht gefunden." >&2
          echo "[vectoplan-app] PWD: $(pwd)" >&2
          echo "[vectoplan-app] Inhalt:" >&2
          ls -la >&2 || true
          exit 1
        fi

        sed -i 's/\r$//' ./entrypoint.sh 2>/dev/null || true
        chmod +x ./entrypoint.sh 2>/dev/null || true

        exec /bin/bash ./entrypoint.sh

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_APP_PUBLIC_PORT:-5103}:${VECTOPLAN_APP_INTERNAL_PORT:-8000}"

    expose:
      - "${VECTOPLAN_APP_INTERNAL_PORT:-8000}"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport os, socket, sys, urllib.request\nport = int(os.getenv('PORT', '8000'))\nbase = f'http://127.0.0.1:{port}'\nfor path in ('/ready', '/health/ready', '/healthz', '/ui', '/'):\n    try:\n        resp = urllib.request.urlopen(base + path, timeout=3)\n        status = getattr(resp, 'status', 200)\n        if 200 <= status < 500:\n            sys.exit(0)\n    except Exception:\n        pass\ntry:\n    s = socket.create_connection(('127.0.0.1', port), 3)\n    s.close()\n    sys.exit(0)\nexcept Exception:\n    sys.exit(1)\nPY"
        ]
      interval: "${VECTOPLAN_APP_HEALTH_INTERVAL:-20s}"
      timeout: "${VECTOPLAN_APP_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_APP_HEALTH_RETRIES:-10}
      start_period: "${VECTOPLAN_APP_HEALTH_START_PERIOD:-30s}"

    volumes:
      - ./services/vectoplan-app:/app:rw
      - vectoplan-app-media:/app/media

    networks:
      vectoplan-net:
        aliases:
          - vectoplan-app
          - app
      vectoplan-shared:
        aliases:
          - vectoplan-app
          - server-app

  vectoplan-geo-db:
    <<: *vectoplan-service-defaults
    image: postgis/postgis:16-3.5

    environment:
      POSTGRES_DB: "${PG_ADMIN_DB:-postgres}"
      POSTGRES_USER: "${PG_ADMIN_USER:-postgres}"
      POSTGRES_PASSWORD: "${PG_ADMIN_PASSWORD:-postgres}"
      PGDATA: "/var/lib/postgresql/data/pgdata"

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${VECTOPLAN_GEO_POSTGRES_PUBLIC_PORT:-15434}:5432"

    expose:
      - "5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
        ]
      interval: "${VECTOPLAN_GEO_DB_HEALTH_INTERVAL:-5s}"
      timeout: "${VECTOPLAN_GEO_DB_HEALTH_TIMEOUT:-5s}"
      retries: ${VECTOPLAN_GEO_DB_HEALTH_RETRIES:-10}
      start_period: "${VECTOPLAN_GEO_DB_HEALTH_START_PERIOD:-10s}"

    volumes:
      - vectoplan-geo-postgres-data:/var/lib/postgresql/data

    networks:
      vectoplan-net:
        aliases:
          - vectoplan-geo-db
          - geo-db

  db-postgis-init:
    <<: *vectoplan-init-service-defaults
    image: postgis/postgis:16-3.5

    environment:
      POSTGRES_DB: "${PG_ADMIN_DB:-postgres}"
      POSTGRES_USER: "${PG_ADMIN_USER:-postgres}"
      POSTGRES_PASSWORD: "${PG_ADMIN_PASSWORD:-postgres}"
      PGPASSWORD: "${PG_ADMIN_PASSWORD:-postgres}"

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -ec

    command:
      - |
        set -eu

        until pg_isready -h vectoplan-geo-db -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" >/dev/null 2>&1; do
          echo "[db-postgis-init] Warte auf PostgreSQL..."
          sleep 2
        done

        psql -h vectoplan-geo-db -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 <<'SQL'
        CREATE EXTENSION IF NOT EXISTS postgis;
        CREATE SCHEMA IF NOT EXISTS raw;
        CREATE SCHEMA IF NOT EXISTS pub;
        CREATE SCHEMA IF NOT EXISTS edit;
        CREATE SCHEMA IF NOT EXISTS meta;
        SQL

        echo "[db-postgis-init] PostGIS und Schemas wurden sichergestellt."

    networks:
      vectoplan-net:
        aliases:
          - db-postgis-init

  geoserver:
    <<: *vectoplan-service-defaults
    image: docker.osgeo.org/geoserver:2.28.3

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy
      db-postgis-init:
        condition: service_completed_successfully

    environment:
      SKIP_DEMO_DATA: "true"
      WEBAPP_CONTEXT: "geoserver"
      ROOT_WEBAPP_REDIRECT: "true"
      PROXY_BASE_URL: "${GEOSERVER_PUBLIC_BASE_URL:-http://localhost:5182/geoserver}"
      GEOSERVER_ADMIN_USER: "${GEOSERVER_ADMIN_USER:-admin}"
      GEOSERVER_ADMIN_PASSWORD: "${GEOSERVER_ADMIN_PASSWORD:-geoserver}"
      RUN_UNPRIVILEGED: "true"
      RUN_WITH_USER_UID: "${GEOSERVER_RUN_UID:-10001}"
      RUN_WITH_USER_GID: "${GEOSERVER_RUN_GID:-10001}"
      CHANGE_OWNERSHIP_ON_FOLDERS: "/opt /opt/geoserver_data"
      EXTRA_JAVA_OPTS: "${GEOSERVER_EXTRA_JAVA_OPTS:--Xms512m -Xmx1024m}"
      HEALTHCHECK_URL: "http://127.0.0.1:8080/geoserver/rest/about/version.json"

    volumes:
      - geoserver-data:/opt/geoserver_data

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${GEOSERVER_PUBLIC_PORT:-5182}:8080"

    expose:
      - "8080"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u \"$${GEOSERVER_ADMIN_USER}:$${GEOSERVER_ADMIN_PASSWORD}\" -H \"Accept: application/json\" \"$${HEALTHCHECK_URL}\" >/dev/null 2>&1 || exit 1"
        ]
      interval: "${GEOSERVER_HEALTH_INTERVAL:-30s}"
      timeout: "${GEOSERVER_HEALTH_TIMEOUT:-10s}"
      retries: ${GEOSERVER_HEALTH_RETRIES:-10}
      start_period: "${GEOSERVER_HEALTH_START_PERIOD:-60s}"

    networks:
      vectoplan-net:
        aliases:
          - geoserver
          - vectoplan-geoserver

  geoserver-orchestrator-db-init:
    <<: *vectoplan-init-service-defaults
    build: *geoserver_orchestrator_build

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy
      db-postgis-init:
        condition: service_completed_successfully

    environment: *geoserver_orchestrator_db_init_environment
    volumes: *geoserver_orchestrator_volumes

    networks:
      vectoplan-net:
        aliases:
          - geoserver-orchestrator-db-init

  geoserver-orchestrator-sync-init:
    <<: *vectoplan-init-service-defaults
    profiles:
      - geo-sync

    build: *geoserver_orchestrator_build

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy
      geoserver:
        condition: service_healthy
      geoserver-orchestrator-db-init:
        condition: service_completed_successfully

    environment: *geoserver_orchestrator_sync_init_environment
    volumes: *geoserver_orchestrator_volumes

    networks:
      vectoplan-net:
        aliases:
          - geoserver-orchestrator-sync-init

  geoserver-orchestrator:
    <<: *vectoplan-service-defaults
    build: *geoserver_orchestrator_build

    depends_on:
      vectoplan-geo-db:
        condition: service_healthy
      geoserver:
        condition: service_healthy
      geoserver-orchestrator-db-init:
        condition: service_completed_successfully

    environment: *geoserver_orchestrator_runtime_environment
    volumes: *geoserver_orchestrator_volumes

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${GEOSERVER_ORCHESTRATOR_PUBLIC_PORT:-5110}:8010"

    expose:
      - "8010"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS \"http://127.0.0.1:8010/health/ready\" >/dev/null 2>&1 || curl -fsS \"http://127.0.0.1:8010/health/live\" >/dev/null 2>&1 || curl -fsS \"http://127.0.0.1:8010/health\" >/dev/null 2>&1 || exit 1"
        ]
      interval: "${GEOSERVER_ORCHESTRATOR_HEALTH_INTERVAL:-30s}"
      timeout: "${GEOSERVER_ORCHESTRATOR_HEALTH_TIMEOUT:-5s}"
      retries: ${GEOSERVER_ORCHESTRATOR_HEALTH_RETRIES:-5}
      start_period: "${GEOSERVER_ORCHESTRATOR_HEALTH_START_PERIOD:-20s}"

    networks:
      vectoplan-net:
        aliases:
          - geoserver-orchestrator
          - orchestrator
      vectoplan-shared:
        aliases:
          - geoserver-orchestrator
          - server-geoserver-orchestrator

  openlayer:
    <<: *vectoplan-service-defaults

    build:
      context: ./services/vectoplan-openLayer
      dockerfile: Dockerfile

    environment:
      HOST: "0.0.0.0"
      OPENLAYER_PORT: "8090"
      LOG_LEVEL: "${OPENLAYER_LOG_LEVEL:-INFO}"

      # Public Browser-/iframe-Kontext.
      # WICHTIG: Der Browser sieht localhost:5190, nicht den Container-Port 8090.
      OPENLAYER_PUBLIC_URL: "${OPENLAYER_PUBLIC_URL:-http://localhost:5190}"
      OPENLAYER_PUBLIC_BASE_URL: "${OPENLAYER_PUBLIC_BASE_URL:-http://localhost:5190}"
      OPENLAYER_ROUTE: "${OPENLAYER_ROUTE:-/map}"
      OPENLAYER_EMBED_ENABLED: "${OPENLAYER_EMBED_ENABLED:-true}"
      OPENLAYER_FRAME_ANCESTORS: "${OPENLAYER_FRAME_ANCESTORS:-http://localhost:5103 http://127.0.0.1:5103}"
      OPENLAYER_ALLOWED_FRAME_PARENTS: "${OPENLAYER_ALLOWED_FRAME_PARENTS:-http://localhost:5103 http://127.0.0.1:5103}"
      VECTOPLAN_APP_PUBLIC_URL: "${VECTOPLAN_APP_PUBLIC_URL:-http://localhost:5103}"

      GEOSERVER_ORCHESTRATOR_URL: "${GEOSERVER_ORCHESTRATOR_INTERNAL_URL:-http://geoserver-orchestrator:8010}"
      GEOSERVER_ORCHESTRATOR_PUBLIC_URL: "${GEOSERVER_ORCHESTRATOR_PUBLIC_URL:-http://localhost:5110}"
      GEOSERVER_INTERNAL_URL: "${GEOSERVER_INTERNAL_BASE_URL:-http://geoserver:8080/geoserver}"
      GEOSERVER_PUBLIC_URL: "${GEOSERVER_PUBLIC_BASE_URL:-http://localhost:5182/geoserver}"

      MAPBOX_ACCESS_TOKEN: "${MAPBOX_ACCESS_TOKEN:-}"
      MAPBOX_STYLE_URL: "${MAPBOX_STYLE_URL:-}"

    depends_on:
      geoserver-orchestrator:
        condition: service_healthy

    ports:
      - "${VECTOPLAN_HOST_BIND:-127.0.0.1}:${OPENLAYER_PUBLIC_PORT:-5190}:8090"

    expose:
      - "8090"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport sys, urllib.request\nfor path in ('/ready', '/health', '/map', '/'):\n    try:\n        resp = urllib.request.urlopen('http://127.0.0.1:8090' + path, timeout=3)\n        status = getattr(resp, 'status', 200)\n        if 200 <= status < 500:\n            sys.exit(0)\n    except Exception:\n        pass\nsys.exit(1)\nPY"
        ]
      interval: "${OPENLAYER_HEALTH_INTERVAL:-10s}"
      timeout: "${OPENLAYER_HEALTH_TIMEOUT:-5s}"
      retries: ${OPENLAYER_HEALTH_RETRIES:-5}
      start_period: "${OPENLAYER_HEALTH_START_PERIOD:-15s}"

    networks:
      vectoplan-net:
        aliases:
          - openlayer
          - vectoplan-openlayer
      vectoplan-shared:
        aliases:
          - openlayer
          - server-openlayer

volumes:
  vectoplan-library-postgres-data:
  vectoplan-chunk-postgres-data:
  vectoplan-app-postgres-data:
  vectoplan-app-media:
  vectoplan-geo-postgres-data:
  geoserver-data:
  geoserver-orchestrator-tmp-data:
  geoserver-orchestrator-logs:

networks:
  vectoplan-net:
    driver: bridge

  vectoplan-shared:
    name: "${VECTOPLAN_SHARED_NETWORK:-vectoplan-shared-net}"
    external: true